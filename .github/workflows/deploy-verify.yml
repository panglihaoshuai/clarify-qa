name: Deploy Verify

on:
  workflow_dispatch:
    inputs:
      service-name:
        description: 'Railway service name'
        required: false
        default: 'clarify-qa'
        type: string
      deployment-id:
        description: 'Deployment ID to verify (leave empty for latest)'
        required: false
        default: ''
        type: string
      playwright-only:
        description: 'Skip deploy verification, only run smoke tests'
        required: false
        default: 'false'
        type: string

jobs:
  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Authenticate Railway
        run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Link project
        run: railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} --service ${{ github.event.inputs.service-name || 'clarify-qa' }}
        continue-on-error: true

      # ─── Deployment verification (skip if playwright-only) ───
      - name: Get deployment ID
        id: deployment
        if: github.event.inputs.playwright-only != 'true'
        run: |
          if [ -n "${{ github.event.inputs.deployment-id }}" ]; then
            echo "id=${{ github.event.inputs.deployment-id }}" >> $GITHUB_OUTPUT
            echo "mode=input"
          else
            DEPLOYMENT=$(railway deployment list --service ${{ github.event.inputs.service-name || 'clarify-qa' }} --json | python3 -c "
import json,sys
data=json.load(sys.stdin)
for d in data.get('deployments',[]):
    if d.get('status') != 'REMOVED':
        print(d['id'])
        break
" 2>/dev/null)
            echo "id=$DEPLOYMENT"
            echo "mode=latest"
            echo "id=$DEPLOYMENT" >> $GITHUB_OUTPUT
          fi

      - name: Get deployment status
        if: github.event.inputs.playwright-only != 'true'
        id: status
        run: |
          DEPLOY_STATUS=$(railway deployment list --service ${{ github.event.inputs.service-name || 'clarify-qa' }} --json | python3 -c "
import json,sys
data=json.load(sys.stdin)
for d in data.get('deployments',[]):
    if d.get('status') != 'REMOVED':
        print(d.get('status','UNKNOWN'))
        break
" 2>/dev/null)
          echo "status=$DEPLOY_STATUS"
          echo "status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT

      - name: Get service URL
        if: github.event.inputs.playwright-only != 'true'
        id: service-info
        run: |
          railway variables --json | python3 -c "
import json,sys
data=json.load(sys.stdin)
for v in data:
    if v.get('key') in ('RAILWAY_PUBLIC_DOMAIN','NEXT_PUBLIC_APP_URL'):
        print(v['value'])
        break
" > url.txt
          echo "url=$(cat url.txt)" >> $GITHUB_OUTPUT

      - name: Fetch deployment logs
        if: github.event.inputs.playwright-only != 'true'
        run: |
          mkdir -p logs
          railway logs --deployment ${{ steps.deployment.outputs.id }} --lines 80 2>&1 | tail -80 > logs/deployment.log || echo "No logs available" > logs/deployment.log
          echo "=== Deployment Logs ===" >> logs/deployment.log
          cat logs/deployment.log

      - name: Check deployment status
        if: github.event.inputs.playwright-only != 'true'
        run: |
          echo "Deployment ID: ${{ steps.deployment.outputs.id }}"
          echo "Status: ${{ steps.status.outputs.status }}"
          if [ "${{ steps.status.outputs.status }}" = "SUCCESS" ]; then
            echo "✅ Deployment succeeded"
          else
            echo "❌ Deployment status: ${{ steps.status.outputs.status }}"
            exit 1
          fi

      # ─── Health check ───
      - name: Health check
        if: github.event.inputs.playwright-only != 'true'
        id: health
        run: |
          URL="${{ steps.service-info.outputs.url }}"
          echo "Checking health at: https://$URL"

          # Try /api/health first
          HTTP_CODE=$(curl -fsSL --max-time 15 "https://$URL/api/health" -o /dev/null -w "%{http_code}" 2>/dev/null)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "health=healthy (/api/health returned 200)"
            echo "health=healthy" >> $GITHUB_OUTPUT
            echo "✅ Health check passed (/api/health)"
            echo "URL=https://$URL" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fallback to /login
          HTTP_CODE=$(curl -fsSL --max-time 15 "https://$URL/login" -o /dev/null -w "%{http_code}" 2>/dev/null)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "health=degraded (/api/health not found, /login returned 200)"
            echo "health=degraded (/api/health not found, /login returned 200)" >> $GITHUB_OUTPUT
            echo "⚠ Health check degraded (/api/health missing, /login works)"
            echo "URL=https://$URL" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "health=unreachable"
          echo "health=unreachable" >> $GITHUB_OUTPUT
          echo "❌ Health check failed (both /api/health and /login returned non-200)"
          exit 1

      # ─── Playwright smoke test ───
      - name: Install Playwright
        run: npx playwright install --with-deps chromium 2>&1 | tail -5

      - name: Run smoke tests
        id: playwright
        run: |
          export BASE_URL="https://${{ steps.service-info.outputs.url }}"
          npx playwright test \
            tests/e2e/auth.spec.ts \
            --project=chromium \
            --reporter=list \
            --timeout=30000 \
            --retries=1 \
            2>&1 | tee playwright-output.txt

      # ─── Upload artifacts on failure ───
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: logs/
          retention-days: 7

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            playwright-output.txt
          retention-days: 7

      # ─── Summary ───
      - name: Summary
        run: |
          echo "## Post-Deploy Verification Summary"
          echo ""
          echo "| Check | Result |"
          echo "|-------|--------|"
          echo "| Deployment | ${{ steps.deployment.outputs.mode == 'input' && github.event.inputs.deployment-id || steps.deployment.outputs.id }} (${{ steps.status.outputs.status }}) |"
          echo "| Health | ${{ steps.health.outputs.health }} |"
          echo "| Smoke Tests | ${{ job.status }} |"
          echo ""
          echo "**Artifacts (on failure):** deployment-logs, playwright-report"
