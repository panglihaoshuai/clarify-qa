name: Deploy Verify Debug

on:
  workflow_dispatch:
    inputs:
      service-name:
        description: 'Railway service name'
        required: false
        default: 'clarify-qa'
        type: string
      deployment-id:
        description: 'Deployment ID to verify (leave empty for latest)'
        required: false
        default: ''
        type: string
      playwright-only:
        description: 'Skip deploy verification, only run smoke tests'
        required: false
        default: 'false'
        type: string
  push:

jobs:
  debug:
    name: Debug Test
    runs-on: ubuntu-latest
    steps:
      - name: Echo start
        run: echo "debug start"

      - name: Echo done
        run: echo "debug done"
