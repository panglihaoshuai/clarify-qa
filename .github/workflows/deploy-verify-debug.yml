# deploy-verify-debug.yml — Step灌 experiment branch
name: Deploy Verify Debug

on:
  workflow_dispatch:
    inputs:
      service-name:
        description: 'Railway service name'
        required: false
        default: 'clarify-qa'
        type: string
      deployment-id:
        description: 'Deployment ID to verify (leave empty for latest)'
        required: false
        default: ''
        type: string
      playwright-only:
        description: 'Skip deploy verification, only run smoke tests'
        required: false
        default: 'false'
        type: string
  push:

jobs:
  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Authenticate Railway
        run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Link project
        run: railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} --service ${{ github.event.inputs.service-name || 'clarify-qa' }}
        continue-on-error: true

      - name: Get deployment ID
        id: deployment
        run: |
          if [ -n "${{ github.event.inputs.deployment-id }}" ]; then
            echo "id=${{ github.event.inputs.deployment-id }}" >> $GITHUB_OUTPUT
            echo "mode=input"
          else
            DEPLOYMENT=$(railway deployment list --service ${{ github.event.inputs.service-name || 'clarify-qa' }} --json | python3 -c "
import json,sys
data=json.load(sys.stdin)
for d in data.get('deployments',[]):
    if d.get('status') != 'REMOVED':
        print(d['id'])
        break
" 2>/dev/null)
            echo "id=$DEPLOYMENT"
            echo "mode=latest"
            echo "id=$DEPLOYMENT" >> $GITHUB_OUTPUT
          fi
